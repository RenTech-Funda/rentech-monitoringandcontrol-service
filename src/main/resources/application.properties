# Spring Application Name
spring.application.name=monitoring-service

# Profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Spring DataSource Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Data JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.physical-strategy=com.floweytech.agrotrack.monitoringservice.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Internationalization (i18n) Configuration
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600

server.port=${PORT:8084}

# Elements take their values from maven pom.xml build-related information
documentation.application.title=@project.name@
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration Properties
authorization.jwt.secret=${AUTHORIZATION_JWT_SECRET}
authorization.jwt.expiration.days=${AUTHORIZATION_JWT_EXPIRATION_DAYS}

# External services
services.organization.url=${ORGANIZATION_SERVICE_URL:http://localhost:8083}

# OpenWeather integration
openweather.api.key=${OPENWEATHER_API_KEY:}
openweather.api.url=${OPENWEATHER_API_URL:https://api.openweathermap.org}
