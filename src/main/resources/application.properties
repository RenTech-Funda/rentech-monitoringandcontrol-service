# Spring Application Name
spring.application.name=monitoring-service

# Profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Spring DataSource Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Data JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.physical-strategy=com.floweytech.agrotrack.monitoringservice.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Internationalization (i18n) Configuration
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=3600

server.port=${PORT:8084}

# Elements take their values from maven pom.xml build-related information
documentation.application.title=@project.name@
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration Properties
authorization.jwt.secret=${AUTHORIZATION_JWT_SECRET}
authorization.jwt.expiration.days=${AUTHORIZATION_JWT_EXPIRATION_DAYS}

# External services
services.organization.url=${ORGANIZATION_SERVICE_URL:http://localhost:8083}

# OpenWeather integration
openweather.api.key=${OPENWEATHER_API_KEY:}
openweather.api.url=${OPENWEATHER_API_URL:https://api.openweathermap.org}
openweather.connect-timeout-seconds=${OPENWEATHER_CONNECT_TIMEOUT_SECONDS:3}
openweather.read-timeout-seconds=${OPENWEATHER_READ_TIMEOUT_SECONDS:5}

# OpenWeather resilience
resilience.openweather.sliding-window-size=${OPENWEATHER_CB_SLIDING_WINDOW_SIZE:5}
resilience.openweather.minimum-number-of-calls=${OPENWEATHER_CB_MINIMUM_NUMBER_OF_CALLS:3}
resilience.openweather.failure-rate-threshold=${OPENWEATHER_CB_FAILURE_RATE_THRESHOLD:50}
resilience.openweather.wait-duration-in-open-state-seconds=${OPENWEATHER_CB_WAIT_DURATION_IN_OPEN_STATE_SECONDS:30}
resilience.openweather.permitted-calls-in-half-open-state=${OPENWEATHER_CB_PERMITTED_CALLS_IN_HALF_OPEN_STATE:2}
resilience.openweather.slow-call-duration-seconds=${OPENWEATHER_CB_SLOW_CALL_DURATION_SECONDS:5}
resilience.openweather.slow-call-rate-threshold=${OPENWEATHER_CB_SLOW_CALL_RATE_THRESHOLD:50}
